    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ophelia Labs - Research, Infrastructure & Resources</title>
    <meta name="description" content="Comprehensive platform for quantum computing research, enterprise infrastructure, and technical resources.">
    <meta name="keywords" content="quantum computing, infrastructure, research, deployment, enterprise, Q#, Python, HDF5">
    <meta property="og:title" content="Ophelia Labs - Research & Infrastructure">
    <meta property="og:description" content="Comprehensive platform for quantum computing research, enterprise infrastructure, and technical resources.">
    <link rel="stylesheet" href="Layout/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({ 
            startOnLoad: false,
            theme: 'dark',
            securityLevel: 'loose',
            themeVariables: {
                primaryColor: '#0d0d0d',
                primaryTextColor: '#fff',
                primaryBorderColor: '#333',
                fontSize: '14px',
                fontFamily: 'Arial, sans-serif'
            }
        });
    </script>
</head>
<body>
    <div id="navbar"></div>
    <div id="sidebar"></div>
    <main id="main-content">
        <div id="home" class="page active"></div>
        <div id="aau" class="page"></div>
        <div id="content" class="page"></div>
        
        <!-- Implant -->
        <div id="implant" class="page"></div>
        <div id="implant-index2" class="page"></div>
        <div id="implant-index3" class="page"></div>
            <!-- Harvest -->
            <div id="harvest"" class="page"></div>
            <div id="harvest-index2" class="page"></div>

        <!-- Curtain -->
        <div id="curtain" class="page"></div>
        <div id="curtain-index2" class="page"></div>
        <div id="curtain-index3" class="page"></div>

        <!-- Informatics -->
        <div id="informatics" class="page"></div>
        <div id="informatics-index2" class="page"></div>
        <div id="informatics-index3" class="page"></div>

        <!-- Comm -->
        <div id="comm" class="page"></div>
        <div id="comm-index2" class="page"></div>
        <div id="comm-index3" class="page"></div>
            <!-- Comm/Geo -->
            <div id="geo" class="page"></div>
            <div id="geo-index1" class="page"></div>
            <div id="geo-index2" class="page"></div>
            <!-- Comm/Hybrid -->
            <div id="hybrid" class="page"></div>
            <div id="hybrid-index2" class="page"></div>
            <div id="hybrid-index3" class="page"></div>
            <!-- Comm/SIEM -->
            <div id="siem" class="page"></div>
            <div id="siem-index2" class="page"></div>
            <div id="siem-index3" class="page"></div>
    </main>
    
    <script src="Layout/app.js"></script>
    <script>
        // Page configuration
        const PAGES = {
            'home': 'Readme.md',
            'aau': 'AAU+/index.html',
            'content': 'Content/Readme.md',
            // Implant
            'implant': 'Implant/index.md',
            'implant-index2': 'Implant/index2.md',
            'implant-index3': 'Implant/index3.md',
                // Implant/Harvest
                'harvest': 'Implant/Harvest/index.md',
                'harvest-index2': 'Implant/Harvest/index2.md',
            // Informatics
            'informatics': 'Informatics/index.md',
            'informatics-index2': 'Informatics/index2.md',
            'informatics-index3': 'Informatics/index3.md',
            // Curtain
            'curtain': 'Curtain/index.md',
            'curtain-index2': 'Curtain/index2.md',
            'curtain-index3': 'Curtain/index3.md',
            // Comm
            'comm': 'Comm/index.md',
            'comm-index2': 'Comm/index2.md',
            'comm-index3': 'Comm/index3.md',
                // Comm/Geo
                'geo': 'Comm/Geo/index.md',
                'geo-index2': 'Comm/Geo/index2.md',
                'geo-index3': 'Comm/Geo/index3.md',
                // Comm/Hybrid
                'hybrid': 'Comm/Hybrid/index.md',
                'hybrid-index2': 'Comm/Hybrid/index2.md',
                'hybrid-index3': 'Comm/Hybrid/index3.md',
                // Comm/SIEM
                'siem': 'Comm/SIEM/index.md',
                'siem-index2': 'Comm/SIEM/index2.md',
                'siem-index3': 'Comm/SIEM/index3.md'
        };

        const loadedPages = new Set();

        // Load navbar and sidebar
        Promise.all([
            fetch('Layout/navbar.html').then(r => r.text()),
            fetch('Layout/sidebar.html').then(r => r.text())
        ]).then(([navbar, sidebar]) => {
            document.getElementById('navbar').innerHTML = navbar;
            document.getElementById('sidebar').innerHTML = sidebar;
            initNavbar();
            initSidebar();
        }).catch(error => console.error('Error loading layout:', error));

        function loadPageContent(pageId) {
            if (!PAGES.hasOwnProperty(pageId)) {
                console.warn('Page not found:', pageId);
                return Promise.reject('Page not found');
            }

            const pageElement = document.getElementById(pageId);
            if (!pageElement) {
                console.warn('Page element not found:', pageId);
                return Promise.reject('Element not found');
            }

            const filePath = PAGES[pageId];
            const isMarkdown = filePath.endsWith('.md');

            return fetch(filePath)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response.text();
                })
                .then(content => {
                    if (isMarkdown) {
                        // Convert markdown to HTML
                        const html = marked.parse(content);
                        pageElement.innerHTML = `<div class="content-section">${html}</div>`;
                    } else {
                        pageElement.innerHTML = content;
                    }
                    loadedPages.add(pageId);
                    
                    // Render Mermaid diagrams after content is loaded
                    if (window.mermaid) {
                        setTimeout(() => {
                            try {
                                mermaid.run();
                            } catch (err) {
                                console.warn('Error rendering mermaid diagrams:', err);
                            }
                        }, 100);
                    }
                })
                .catch(error => {
                    console.error(`Error loading page ${pageId}:`, error);
                    pageElement.innerHTML = `<div class="content-section"><h1>Error Loading Page</h1><p>Could not load content: ${error}</p></div>`;
                });
        }

        function navigateToPage(hash) {
            const pageId = (hash.substring(1) || 'home').toLowerCase();
            
            if (!PAGES.hasOwnProperty(pageId)) {
                console.warn('Invalid page ID:', pageId);
                return;
            }

            // Hide all pages
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });

            // Show and load target page
            const targetPage = document.getElementById(pageId);
            if (targetPage) {
                targetPage.classList.add('active');
                
                // Load content if not already loaded
                if (!loadedPages.has(pageId)) {
                    loadPageContent(pageId);
                } else {
                    // Already loaded, just render mermaid if needed
                    if (window.mermaid) {
                        setTimeout(() => {
                            try {
                                mermaid.run();
                            } catch (err) {
                                console.warn('Error rendering mermaid:', err);
                            }
                        }, 100);
                    }
                }
            }
        }

        // Initialize when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            // Load initial page
            navigateToPage(window.location.hash);
            
            // Handle hash changes
            window.addEventListener('hashchange', () => {
                navigateToPage(window.location.hash);
            });
        });
    </script>
</body>
</html>
